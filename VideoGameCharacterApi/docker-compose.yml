services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=PasswordKuat123!!
    ports:
      - "1433:1433"

  api:
    build: .
    container_name: dotnet_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=VideoGameCharactersDb;User Id=sa;Password=PasswordKuat123!!;TrustServerCertificate=True
      - ASPNETCORE_URLS=http://+:8080